services:
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  sql:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
    expose:
      - "1433"
    volumes:
      - type: "volume"
        target: "/var/opt/mssql"
        source: "workouttracker.apphost-4f2838dd29-sql-data"
        read_only: false
    networks:
      - "aspire"
  api:
    image: "${API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${API_PORT}"
      ConnectionStrings__WorkoutTrackerDatabase: "Server=sql,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=WorkoutTrackerDatabase"
      WORKOUTTRACKERDATABASE_HOST: "sql"
      WORKOUTTRACKERDATABASE_PORT: "1433"
      WORKOUTTRACKERDATABASE_USERNAME: "sa"
      WORKOUTTRACKERDATABASE_PASSWORD: "${SQL_PASSWORD}"
      WORKOUTTRACKERDATABASE_URI: "mssql://sa:${SQL_PASSWORD}@sql:1433/WorkoutTrackerDatabase"
      WORKOUTTRACKERDATABASE_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql:1433;databaseName=WorkoutTrackerDatabase;trustServerCertificate=true"
      WORKOUTTRACKERDATABASE_DATABASENAME: "WorkoutTrackerDatabase"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "api"
    ports:
      - "${API_PORT}"
    depends_on:
      sql:
        condition: "service_started"
    networks:
      - "aspire"
  frontend:
    image: "${FRONTEND_IMAGE}"
    environment:
      NODE_ENV: "production"
      PORT: "8000"
      API_HTTP: "http://api:${API_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "frontend"
    ports:
      - "8000"
    depends_on:
      api:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  workouttracker.apphost-4f2838dd29-sql-data:
    driver: "local"
