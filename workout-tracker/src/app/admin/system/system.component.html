<div class="container-fluid">
  <br />
  <div class="row">
    <div class="col-12 text-center">
      <h3 class="greeting">System</h3>
    </div>
  </div>
  <div class="row pt-3">
    <div class="col-4"> <!--LEFT COLUMN-->
      <button class="btn btn-primary btn-fullWidth" (click)="testSoundService()">Test SoundService</button>
    </div>
    <div class="col-4"> <!--CENTER COLUMN-->
      <button class="btn btn-info btn-fullWidth" (click)="testToast()">Test Toast</button>
    </div>
    <div class="col-4"> <!--RIGHT COLUMN-->
      <button class="btn btn-danger btn-fullWidth" (click)="testCountdown()">Test Countdown</button>
      <nz-modal nzTitle="Timed Set Countdown" [(nzVisible)]="showCountdownModal" [nzFooter]="null" nzClosable="true"
        (nzOnCancel)="showCountdownModal.set(false)">
        <div *nzModalContent>
          <wt-countdown-timer [secondsToCountdown]="10" [secondsLeadInTime]="10"
            [activatedDateTime]="countdownModalActivatedDateTime()" [targetReps]="40">
          </wt-countdown-timer>
        </div>
      </nz-modal>
    </div>
  </div>
  <div class="row pt-3">
    <div class="col-4">
      Spinner: <nz-spin nzSize="large"></nz-spin>
    </div>
    <div class="col-4">
      <h3>Fonts</h3>
      <p>Regular</p>
      <p><i>Italic</i></p>
      <p><b>Bold</b></p>
      <p><strong>Strong</strong></p>
    </div>
    <div class="col-4">
      <h3>Multi-Select with Select/Deselect All</h3>
      <!--Note nzMaxTagCount to limit the number of tags displayed-->
      <nz-select nzMode="multiple" [(ngModel)]="selectedValues" [nzMaxTagCount]="2" [nzDropdownRender]="selectAllTpl" style="width: 300px" nzPlaceHolder="Please select">
        @for(option of options; track option.label) {
          <nz-option [nzValue]="option.value" [nzLabel]="option.label" />
        }
      </nz-select>

      <ng-template #selectAllTpl>
        <div style="padding: 8px; border-bottom: 1px solid #f0f0f0;">
          <input type="checkbox" id="selectAll" style="display: none" />
          <label nz-checkbox for="selectAll" [ngModel]="isAllSelected" [nzIndeterminate]="isIndeterminate"
            (ngModelChange)="toggleAll($event)">
            Select/Deselect All
          </label>
        </div>
      </ng-template>

    </div>
  </div>
</div>
